<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="لعبة من سيربح المليون - اختبر معلوماتك العامة واربح المليون">
    <title>من سيربح المليون</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Particle Background -->
    <div id="particles"></div>

    <!-- Start Screen -->
    <div id="start-screen" class="screen active">
        <div class="logo-container">
            <div class="logo-glow"></div>
            <div class="diamond-icon">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <polygon points="50,5 95,35 75,95 25,95 5,35" fill="url(#diamondGrad)" stroke="#ffd700" stroke-width="2"/>
                    <polygon points="50,5 95,35 75,95 25,95 5,35" fill="url(#diamondShine)" opacity="0.5"/>
                    <defs>
                        <linearGradient id="diamondGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#1a237e"/>
                            <stop offset="50%" style="stop-color:#283593"/>
                            <stop offset="100%" style="stop-color:#0d47a1"/>
                        </linearGradient>
                        <linearGradient id="diamondShine" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ffffff" stop-opacity="0.3"/>
                            <stop offset="100%" style="stop-color:#ffffff" stop-opacity="0"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <h1 class="game-title">من سيربح المليون؟</h1>
            <p class="game-subtitle">اختبر معلوماتك العامة واربح الجائزة الكبرى</p>
        </div>
        <button id="start-btn" class="btn-primary pulse-btn" onclick="startGame()">
            <span class="btn-text">ابدأ اللعب</span>
            <span class="btn-shine"></span>
        </button>
        <div class="start-features">
            <div class="feature">
                <span class="feature-icon">🏆</span>
                <span>١٥ سؤالاً</span>
            </div>
            <div class="feature">
                <span class="feature-icon">💡</span>
                <span>٣ وسائل مساعدة</span>
            </div>
            <div class="feature">
                <span class="feature-icon">💰</span>
                <span>مليون ريال</span>
            </div>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
        <div class="game-layout">
            <!-- Prize Ladder (Left Side) -->
            <div class="prize-ladder" id="prize-ladder">
                <div class="ladder-header">سلم الجوائز</div>
                <div class="ladder-items" id="ladder-items"></div>
            </div>

            <!-- Main Game Area -->
            <div class="game-main">
                <!-- Top Bar -->
                <div class="top-bar">
                    <div class="current-prize" id="current-prize">
                        <span class="prize-label">الجائزة الحالية</span>
                        <span class="prize-value" id="prize-value">٠ ريال</span>
                    </div>
                    <div class="lifelines" id="lifelines">
                        <button class="lifeline-btn" id="lifeline-5050" onclick="useLifeline('5050')" title="حذف إجابتين">
                            <span class="lifeline-icon">50:50</span>
                        </button>
                        <button class="lifeline-btn" id="lifeline-audience" onclick="useLifeline('audience')" title="رأي الجمهور">
                            <span class="lifeline-icon">👥</span>
                        </button>
                        <button class="lifeline-btn" id="lifeline-phone" onclick="useLifeline('phone')" title="اتصل بصديق">
                            <span class="lifeline-icon">📞</span>
                        </button>
                    </div>
                    <div class="question-counter">
                        <span id="question-number">السؤال ١</span>
                        <span>من ١٥</span>
                    </div>
                </div>

                <!-- Timer -->
                <div class="timer-container">
                    <div class="timer-bar">
                        <div class="timer-fill" id="timer-fill"></div>
                    </div>
                    <span class="timer-text" id="timer-text">٣٠</span>
                </div>

                <!-- Question Area -->
                <div class="question-container" id="question-container">
                    <div class="question-diamond"></div>
                    <p class="question-text" id="question-text"></p>
                </div>

                <!-- Answers -->
                <div class="answers-grid" id="answers-grid">
                    <button class="answer-btn" id="answer-0" onclick="selectAnswer(0)">
                        <span class="answer-letter">أ</span>
                        <span class="answer-text" id="answer-text-0"></span>
                    </button>
                    <button class="answer-btn" id="answer-1" onclick="selectAnswer(1)">
                        <span class="answer-letter">ب</span>
                        <span class="answer-text" id="answer-text-1"></span>
                    </button>
                    <button class="answer-btn" id="answer-2" onclick="selectAnswer(2)">
                        <span class="answer-letter">ج</span>
                        <span class="answer-text" id="answer-text-2"></span>
                    </button>
                    <button class="answer-btn" id="answer-3" onclick="selectAnswer(3)">
                        <span class="answer-letter">د</span>
                        <span class="answer-text" id="answer-text-3"></span>
                    </button>
                </div>

                <!-- Confirm / Walk Away -->
                <div class="action-bar" id="action-bar" style="display:none;">
                    <button class="btn-confirm" id="btn-confirm" onclick="confirmAnswer()">تأكيد الإجابة</button>
                    <button class="btn-walkaway" onclick="walkAway()">الانسحاب</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Audience Poll Modal -->
    <div id="audience-modal" class="modal">
        <div class="modal-content">
            <h2>📊 تصويت الجمهور</h2>
            <div class="poll-chart" id="poll-chart"></div>
            <button class="btn-primary" onclick="closeModal('audience-modal')">حسناً</button>
        </div>
    </div>

    <!-- Phone a Friend Modal -->
    <div id="phone-modal" class="modal">
        <div class="modal-content">
            <h2>📞 اتصل بصديق</h2>
            <div class="phone-animation" id="phone-animation">
                <div class="phone-ring">📱</div>
            </div>
            <p class="friend-response" id="friend-response"></p>
            <button class="btn-primary" onclick="closeModal('phone-modal')">شكراً</button>
        </div>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="screen">
        <div class="result-content">
            <div class="result-icon" id="result-icon"></div>
            <h1 class="result-title" id="result-title"></h1>
            <p class="result-subtitle" id="result-subtitle"></p>
            <div class="result-prize" id="result-prize"></div>
            <button class="btn-primary pulse-btn" onclick="restartGame()">العب مرة أخرى</button>
        </div>
        <div id="confetti-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
